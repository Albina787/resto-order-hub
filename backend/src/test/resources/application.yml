spring:
  application:
    name: resto-order-hub-test

  datasource:
    url: jdbc:mysql://localhost:3306/resto_order_hub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: resto_user
    password: resto_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  mail:
    host: localhost
    port: 25

jwt:
  secret: test-secret-key-for-testing-must-be-at-least-256-bits-long-enough
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

server:
  port: 0

logging:
  level:
    com.restoorderhub: INFO