version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: resto-order-hub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: resto_order_hub
      MYSQL_USER: resto_user
      MYSQL_PASSWORD: resto_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - resto-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resto-order-hub-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/resto_order_hub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: resto_user
      SPRING_DATASOURCE_PASSWORD: resto_password
      JWT_SECRET: your-secret-key-for-jwt-token-signing-must-be-at-least-256-bits-long-change-in-production
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - resto-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  resto-network:
    driver: bridge
